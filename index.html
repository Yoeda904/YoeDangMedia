<style>
:root{
  --bg:#0b0f16;
  --card: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.12);
  --text: #f2f5ff;
  --muted: rgba(242,245,255,0.74);
  --accent: #ffd54a;
  --accent2: #ff4bd6;
  --accent3: #4aa3ff;
  --shadow: 0 26px 70px rgba(0,0,0,0.55);
  --radius: 22px;
}

*{ box-sizing:border-box; }
html{ scroll-behavior:smooth; }

body{
  margin:0;
  font-family: Verdana, Geneva, Tahoma, sans-serif;
  font-size: large;
  color: var(--text);
  background: var(--bg);
  overflow-x:hidden;
}

/* Background */
.bg-anim{
  position: fixed;
  inset: 0;
  z-index: -2;
  background:
    radial-gradient(950px 520px at 14% 10%, rgba(255,213,74,0.18), transparent 58%),
    radial-gradient(900px 520px at 86% 16%, rgba(255,75,214,0.15), transparent 58%),
    radial-gradient(980px 700px at 56% 92%, rgba(74,163,255,0.14), transparent 62%),
    linear-gradient(180deg, rgba(10,14,22,0.35), rgba(10,14,22,0.82));
  animation: floatGlow 16s ease-in-out infinite alternate;
}

@keyframes floatGlow{
  0%{ transform: translate3d(0,0,0) scale(1); }
  100%{ transform: translate3d(0,-10px,0) scale(1.02); }
}

.container{
  width: min(1120px, 100%);
  margin: 0 auto;
  padding: 22px 16px 70px;
}

/* UPDATED HEADER CENTERING */
.topbar{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:14px;
  padding:16px;
  border:1px solid var(--border);
  background: var(--card);
  border-radius: var(--radius);
  backdrop-filter: blur(10px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.35);
}

.brand{
  text-align:center;
}

.brand .name{
  font-weight: 900;
  font-size: 1.18em;
  background: linear-gradient(90deg, rgba(255,213,74,0.98), rgba(255,75,214,0.92));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.brand .tagline{
  color: rgba(242,245,255,0.78);
  margin-top: 4px;
  text-transform: uppercase;
  font-size: 0.88em;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.btn{
  padding:12px 16px;
  border-radius: 14px;
  text-decoration:none;
  font-weight: 900;
  border:1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.08);
  color: white;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.btn.primary{
  background: linear-gradient(90deg, rgba(255,213,74,0.98), rgba(255,75,214,0.90));
  color: #0b0f16;
  border: 0;
}

/* HERO IMAGE 50% SMALLER */
.heroImageWrap{
  margin-top: 18px;
  border-radius: 26px;
  overflow:hidden;
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(255,255,255,0.04);
  box-shadow: var(--shadow);
  max-width: 560px;   /* reduced from 920px */
  margin-left: auto;
  margin-right: auto;
}

.heroImageWrap img{
  width:100%;
  display:block;
  height:auto;
}

footer{
  margin-top: 34px;
  text-align:center;
  color: rgba(242,245,255,0.55);
  font-size: 0.92em;
}

@media (max-width: 920px){
  .heroImageWrap{ max-width: 100%; }
}
